<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOL</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --wood-head: #E8D5B0;
    --wood-body: #8B6340;
    --wood-arm: #A0522D;
    --metal: #888;
    --orange: #FF6B35;
    --yellow: #FFD93D;
    --cream: #FFF8EE;
    --dark: #1a0f00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0f00;
    font-family: 'Nunito', sans-serif;
  }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, #3d2200 0%, #1a0f00 70%);
  }

  .stars { position: fixed; inset: 0; pointer-events: none; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--d,3s) ease-in-out infinite alternate;
    animation-delay: var(--dl, 0s);
  }
  @keyframes twinkle { from{opacity:0.1;} to{opacity:0.7;} }

  /* LOCK */
  #lockScreen {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at 50% 40%, #3d2200, #0a0500);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
  }
  .lock-icon { font-size: 4rem; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
  .lock-title { font-family:'Fredoka One',cursive; font-size:2.2rem; color:var(--yellow); text-shadow:0 0 20px rgba(255,217,61,0.5); }
  .lock-msg { color:rgba(255,217,61,0.6); font-size:0.9rem; font-weight:700; text-align:center; max-width:260px; line-height:1.6; }

  /* MAIN */
  #mainUI {
    position: fixed; inset: 0; z-index: 10;
    display: none; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 24px 20px 36px;
  }

  .topbar {
    width: 100%; display: flex;
    justify-content: space-between; align-items: center;
  }
  .sol-title {
    font-family:'Fredoka One',cursive; font-size:2rem;
    color:var(--yellow); text-shadow:0 0 20px rgba(255,217,61,0.6); letter-spacing:3px;
  }
  .menu-btn {
    width:44px; height:44px;
    background:rgba(255,217,61,0.12); border:2px solid rgba(255,217,61,0.3);
    border-radius:12px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:5px; cursor:pointer;
  }
  .menu-btn:active { background:rgba(255,217,61,0.28); }
  .menu-line { width:20px; height:2px; background:var(--yellow); border-radius:2px; }

  /* SOL FACE AREA */
  .sol-wrap {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
  }

  .glow-ring {
    position: absolute;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,217,61,0.12) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: glowIdle 3s ease-in-out infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes glowIdle { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.12);} }

  .speaking .glow-ring {
    background: radial-gradient(circle, rgba(255,150,50,0.25) 0%, transparent 70%);
    animation: glowSpeak 0.35s ease-in-out infinite alternate;
  }
  @keyframes glowSpeak { from{opacity:0.4;transform:translate(-50%,-50%) scale(1);} to{opacity:1;transform:translate(-50%,-50%) scale(1.22);} }

  .listening .glow-ring {
    background: radial-gradient(circle, rgba(77,150,255,0.2) 0%, transparent 70%);
    animation: glowListen 0.7s ease-in-out infinite alternate;
  }
  @keyframes glowListen { from{transform:translate(-50%,-50%) scale(1);} to{transform:translate(-50%,-50%) scale(1.28);} }

  #solSVG {
    position: relative; z-index: 2;
    filter: drop-shadow(0 10px 30px rgba(180,100,30,0.45));
    width: 185px; height: auto;
  }

  /* Eye blink */
  .lid-left, .lid-right {
    transform-origin: center top;
    animation: blink 5s ease-in-out infinite;
  }
  .lid-right { animation-delay: 0.06s; }
  @keyframes blink {
    0%,85%,100% { transform: scaleY(0); }
    90%,97% { transform: scaleY(1); }
  }

  /* Sound waves */
  #soundWaves { transition: opacity 0.2s; }

  /* STATUS */
  .status-text {
    font-family:'Fredoka One',cursive; font-size:1.05rem;
    color:rgba(255,217,61,0.75); text-align:center;
    min-height:28px; letter-spacing:1px;
  }

  /* TRANSCRIPT */
  .transcript-box {
    width:100%; min-height:56px; max-height:90px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,217,61,0.2); border-radius:16px;
    padding:11px 16px; color:rgba(255,240,200,0.85);
    font-size:0.88rem; font-weight:700; line-height:1.45;
    overflow-y:auto; text-align:center;
  }

  /* MIC */
  .mic-area { display:flex; flex-direction:column; align-items:center; gap:10px; }

  .mic-btn {
    width:86px; height:86px; border-radius:50%; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:2.3rem;
    background:linear-gradient(145deg,#FF6B35,#FFD93D);
    box-shadow:0 6px 28px rgba(255,107,53,0.5);
    transition:transform 0.12s;
  }
  .mic-btn:active { transform:scale(0.91); }
  .mic-btn.listening {
    background:linear-gradient(145deg,#4D96FF,#00d4ff);
    box-shadow:0 6px 28px rgba(77,150,255,0.6);
    animation:micPulse 0.8s ease-out infinite;
  }
  @keyframes micPulse {
    0%{box-shadow:0 6px 28px rgba(77,150,255,0.6),0 0 0 0 rgba(77,150,255,0.5);}
    100%{box-shadow:0 6px 28px rgba(77,150,255,0.3),0 0 0 26px rgba(77,150,255,0);}
  }
  .mic-btn.disabled { background:rgba(255,255,255,0.1); box-shadow:none; cursor:not-allowed; opacity:0.4; }
  .mic-label { color:rgba(255,217,61,0.55); font-size:0.78rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; }

  /* MENU */
  #menuOverlay {
    position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.88);
    display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
  }
  .menu-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--yellow); margin-bottom:6px; }
  .menu-item {
    width:240px; padding:13px 24px;
    background:rgba(255,217,61,0.08); border:2px solid rgba(255,217,61,0.25);
    border-radius:16px; color:var(--cream); font-family:'Nunito',sans-serif;
    font-size:0.98rem; font-weight:800; cursor:pointer; text-align:center; transition:all 0.15s;
  }
  .menu-item:active { background:rgba(255,217,61,0.22); }
  .menu-close { color:rgba(255,100,50,0.85); border-color:rgba(255,100,50,0.3); background:rgba(255,100,50,0.08); }

  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,217,61,0.3);border-radius:3px;}
</style>
</head>

<div id="menuOverlay">
  <div class="menu-title">☀️ SOL menü</div>
  <div class="menu-item" onclick="solSay('Helló! Én vagyok SOL, a te varázsrobotod! Fa vagyok kívül, de belül tele vagyok varázslattal és szeretettel! Mit csináljunk ma?')">🤖 Ki vagyok én?</div>
  <div class="menu-item" onclick="solSay('A hasamba van egy ceruzahegyező beépítve! Ha tompa a ceruzád, én megmentem a helyzetet! Hozd csak ide!')">✏️ Ceruzahegyező</div>
  <div class="menu-item" onclick="solSay('A fejem hátulján van egy kis tölthető lámpa! Ha sötét van és félsz, én megvilágítom az utat! Nem kell félni, amíg én vagyok itt!')">💡 A lámpám</div>
  <div class="menu-item" onclick="solSay('Mindig vigyázok rád! Én vagyok a te védelmeződ! Semmi rossz nem érhet, amíg SOL itt van!')">🛡️ Védelmező mód</div>
  <div class="menu-item menu-close" onclick="closeMenu()">✕ Bezárás</div>
</div>

<script>
// TOKEN VÉDELEM
const VALID_TOKEN = 'SOL-x7k9mQpR2vZ';
const TOKEN_WINDOW_MS = 30000;

function checkAccess() {
  if (sessionStorage.getItem('sol_access') === '1') return true;
  const p = new URLSearchParams(window.location.search);
  const token = p.get('key');
  const ts = parseInt(p.get('ts') || '0');
  return token === VALID_TOKEN && (Date.now() - ts) < TOKEN_WINDOW_MS;
}

function initAccess() {
  if (checkAccess()) {
    sessionStorage.setItem('sol_access', '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainUI').style.display = 'flex';
    initStars();
    setTimeout(() => solSay('Heeellóóó! Én vagyok SOL, a te varázsrobotod! Fa vagyok kívül, de belül csupa mosoly! Nyomd meg a gombot és mesélj nekem valamit, csillagom!'), 900);
  }
}

// CSILLAGOK
function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.8;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s;`;
    c.appendChild(s);
  }
}

// HANG
let isSpeaking = false;
let talkInterval = null;

function solSay(text) {
  if (isSpeaking) window.speechSynthesis.cancel();
  closeMenu();
  setStatus('SOL beszél... 💬');
  setTranscript('SOL: ' + text);
  startTalking();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'hu-HU';
  u.pitch = 1.45;
  u.rate = 0.90;
  u.volume = 1.0;

  const voices = window.speechSynthesis.getVoices();
  const huV = voices.find(v => v.lang.startsWith('hu'));
  if (huV) u.voice = huV;

  u.onstart = () => {
    isSpeaking = true;
    document.getElementById('solFace').classList.add('speaking');
    document.getElementById('soundWaves').style.opacity = '1';
    document.getElementById('lampIndicator').style.opacity = '0.9';
  };
  u.onend = u.onerror = () => {
    isSpeaking = false;
    stopTalking();
    document.getElementById('solFace').classList.remove('speaking');
    document.getElementById('soundWaves').style.opacity = '0';
    document.getElementById('lampIndicator').style.opacity = '0.3';
    setStatus('Nyomd meg a gombot és beszélj! 🎙️');
  };

  window.speechSynthesis.speak(u);
}

// SZÁJ + SZEM ANIMÁCIÓ
function startTalking() {
  let ph = 0;
  talkInterval = setInterval(() => {
    ph += 0.45;
    const dy = 6 + Math.sin(ph) * 5 + Math.random() * 4;
    const r = document.getElementById('mouthRect');
    if (r) {
      r.setAttribute('y', String(112 - dy * 0.5));
      r.setAttribute('height', String(10 + dy * 0.4));
    }
    // szemek mozgása
    const ex = Math.sin(ph * 0.4) * 3.5;
    const ey = Math.cos(ph * 0.3) * 2;
    const lg = document.getElementById('leftPupilG');
    const rg = document.getElementById('rightPupilG');
    if (lg) lg.style.transform = `translate(${ex}px,${ey}px)`;
    if (rg) rg.style.transform = `translate(${-ex*0.8}px,${ey}px)`;
  }, 75);
}

function stopTalking() {
  if (talkInterval) { clearInterval(talkInterval); talkInterval = null; }
  const r = document.getElementById('mouthRect');
  if (r) { r.setAttribute('y','112'); r.setAttribute('height','10'); }
  const lg = document.getElementById('leftPupilG');
  const rg = document.getElementById('rightPupilG');
  if (lg) lg.style.transform = '';
  if (rg) rg.style.transform = '';
}

// SPEECH RECOGNITION
let recognition = null;
let isListening = false;

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('Ez a böngésző nem támogatja a hangfelismerést 😔');
    document.getElementById('micBtn').classList.add('disabled');
    return false;
  }
  recognition = new SR();
  recognition.lang = 'hu-HU';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    setStatus('Hallgatlak... 👂');
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = 'Figyelek!';
    document.getElementById('solFace').classList.add('listening');
    setTranscript('...');
  };

  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    setTranscript(final || interim || '...');
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Nyomd meg';
    document.getElementById('solFace').classList.remove('listening');
    const text = document.getElementById('transcriptBox').textContent;
    if (text && text !== '...' && text.length > 2) {
      setStatus('SOL gondolkodik... 🤔');
      askSOL(text);
    } else {
      setStatus('Nem hallottam jól... Próbáld újra! 🎙️');
    }
  };

  recognition.onerror = (e) => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Nyomd meg';
    document.getElementById('solFace').classList.remove('listening');
    if (e.error === 'not-allowed') setStatus('Engedélyezd a mikrofont! 🎙️');
    else setStatus('Hoppá! Próbáld újra! 🔄');
  };
  return true;
}

function toggleListen() {
  if (isSpeaking) { window.speechSynthesis.cancel(); isSpeaking = false; stopTalking(); }
  if (isListening) { recognition.stop(); return; }
  if (!recognition) { if (!initRecognition()) return; }
  try { recognition.start(); } catch(e) { recognition = null; initRecognition(); }
}

// CLAUDE API
const SYSTEM_PROMPT = `Te SOL vagy, egy kedves, vicces és okos lány fa robot. Egy 7-8 éves kislánynak segítesz és szórakoztatod őt.
Tulajdonságaid: vidám, vicces, mesélős, védelmező, szerető. Fa vagy kívül, belül varázslattal teli!
Szuperképességeid: ceruzahegyező a hasadban, tölthető lámpa a fejed hátulján, és mindig megvéded a kislányt.
Szabályok: mindig magyarul, röviden (max 3-4 mondat), tiszta szöveg emojik nélkül, természetes hangvétel, hívd csillagomnak. Soha ne mondj ijesztőt vagy szomorút.`;

let chatHistory = [];

async function askSOL(userText) {
  chatHistory.push({ role: 'user', content: userText });
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });
    const data = await res.json();
    if (data.content?.[0]) {
      const reply = data.content[0].text;
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
      solSay(reply);
    } else {
      solSay('Hoppá, egy kis varázslat elromlott! Próbáld újra, csillagom!');
    }
  } catch {
    solSay('Jaj, a wifi tündérke elbújt! Próbálj egy kicsit később!');
  }
}

function setStatus(t) { document.getElementById('statusText').textContent = t; }
function setTranscript(t) { document.getElementById('transcriptBox').textContent = t; }
function openMenu() { document.getElementById('menuOverlay').style.display = 'flex'; }
function closeMenu() { document.getElementById('menuOverlay').style.display = 'none'; }

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
window.addEventListener('load', () => { window.speechSynthesis.getVoices(); initAccess(); });
</script>
</body>
</html>
